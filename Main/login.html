<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - Next Level Transform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      color: #e94560;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      margin-top: 6px;
    }

    h2 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 28px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #e94560;
      background: rgba(255, 255, 255, 0.12);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #e94560;
      cursor: pointer;
    }

    .forgot-password {
      color: #e94560;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .forgot-password:hover {
      opacity: 0.8;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #e94560;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      background: #c73652;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
    }

    .divider span {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
    }

    .signup-link {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    .signup-link a {
      color: #e94560;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .signup-link a:hover {
      opacity: 0.8;
    }

    .error-message {
      display: none;
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid rgba(233, 69, 96, 0.4);
      color: #e94560;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>NEXT LEVEL TRANSFORM</h1>
      <p>당신의 다음 단계를 함께합니다</p>
    </div>

    <h2>로그인</h2>

    <div class="error-message" id="errorMsg">
      이메일 또는 비밀번호가 올바르지 않습니다.
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">이메일</label>
        <input
          type="email"
          id="email"
          placeholder="example@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input
          type="password"
          id="password"
          placeholder="비밀번호를 입력하세요"
          required
          autocomplete="current-password"
        />
      </div>

      <div class="options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" />
          로그인 상태 유지
        </label>
        <a href="#" class="forgot-password">비밀번호 찾기</a>
      </div>

      <button type="submit" class="btn-login">로그인</button>
    </form>

    <div class="divider"><span>또는</span></div>

    <div class="signup-link">
      아직 계정이 없으신가요? <a href="#">회원가입</a>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      // 실제 인증 로직으로 교체 필요
      if (email && password) {
        console.log('로그인 시도:', email);
        // TODO: 서버 인증 API 연동
        errorMsg.style.display = 'none';
      } else {
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
