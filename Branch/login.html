<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - Next Level Transform</title>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      color: #e94560;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      margin-top: 6px;
    }

    h2 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 28px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #e94560;
      background: rgba(255, 255, 255, 0.12);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #e94560;
      cursor: pointer;
    }

    .forgot-password {
      color: #e94560;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .forgot-password:hover {
      opacity: 0.8;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #e94560;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      background: #c73652;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
    }

    .divider span {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
    }

    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn-social {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-social:active {
      transform: scale(0.98);
    }

    .btn-social:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-google {
      background: #ffffff;
      color: #3c4043;
    }

    .btn-google:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-social svg {
      flex-shrink: 0;
    }

    .signup-link {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    .signup-link a {
      color: #e94560;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .signup-link a:hover {
      opacity: 0.8;
    }

    .message {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }

    .message.error {
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid rgba(233, 69, 96, 0.4);
      color: #e94560;
    }

    .message.success {
      background: rgba(52, 168, 83, 0.15);
      border: 1px solid rgba(52, 168, 83, 0.4);
      color: #34a853;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>NEXT LEVEL TRANSFORM</h1>
      <p>당신의 다음 단계를 함께합니다</p>
    </div>

    <h2>로그인</h2>

    <div class="message" id="message"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">이메일</label>
        <input
          type="email"
          id="email"
          placeholder="example@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input
          type="password"
          id="password"
          placeholder="비밀번호를 입력하세요"
          required
          autocomplete="current-password"
        />
      </div>

      <div class="options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" />
          로그인 상태 유지
        </label>
        <a href="#" class="forgot-password">비밀번호 찾기</a>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">로그인</button>
    </form>

    <div class="divider"><span>또는</span></div>

    <div class="social-buttons">
      <button class="btn-social btn-google" id="btnGoogle" onclick="handleGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 로그인
      </button>
    </div>

    <div class="signup-link">
      아직 계정이 없으신가요? <a href="#">회원가입</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://sawlexclfskiczjsehkq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FXYTElNiYrm94lmofodoew_kRTXvTsg';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    function showMessage(text, type = 'error') {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `message ${type}`;
      el.style.display = 'block';
    }

    function setLoading(loading) {
      document.getElementById('btnLogin').disabled = loading;
      document.getElementById('btnGoogle').disabled = loading;
      document.getElementById('btnLogin').textContent = loading ? '로그인 중...' : '로그인';
    }

    // 이메일/비밀번호 로그인
    async function handleLogin(event) {
      event.preventDefault();
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      setLoading(true);
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      setLoading(false);

      if (error) {
        showMessage('이메일 또는 비밀번호가 올바르지 않습니다.', 'error');
        return;
      }

      showMessage('로그인 성공!', 'success');
      console.log('로그인된 유저:', data.user);
      // TODO: 로그인 후 이동할 페이지로 redirect
      // window.location.href = '/dashboard.html';
    }

    // Google 로그인
    async function handleGoogleLogin() {
      setLoading(true);
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + window.location.pathname,
        },
      });
      if (error) {
        showMessage('Google 로그인 중 오류가 발생했습니다.', 'error');
        setLoading(false);
      }
    }

    // 페이지 로드 시 로그인 상태 확인
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        showMessage(`${session.user.email} 로 로그인됐습니다!`, 'success');
        console.log('세션:', session);
        // TODO: window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
